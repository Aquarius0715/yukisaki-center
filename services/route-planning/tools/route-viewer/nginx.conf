worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;

  proxy_cache_path /var/cache/nginx/tiles
    levels=1:2
    keys_zone=route_viewer_tiles:10m
    max_size=256m
    inactive=7d
    use_temp_path=off;

  server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    resolver 127.0.0.11 ipv6=off valid=300s;

    location /tiles/ {
      set $gsi_host cyberjapandata.gsi.go.jp;
      rewrite ^/tiles/(.*)$ /xyz/std/$1 break;
      proxy_pass https://$gsi_host;
      proxy_ssl_server_name on;
      proxy_ssl_name $gsi_host;
      proxy_set_header Host $gsi_host;
      proxy_cache route_viewer_tiles;
      proxy_cache_valid 200 7d;
      proxy_cache_lock on;
      add_header X-Route-Viewer-Tile-Cache $upstream_cache_status always;
    }

    location / {
      try_files $uri $uri/ =404;
    }
  }
}
