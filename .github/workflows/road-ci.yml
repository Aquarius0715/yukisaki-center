name: Road collector CI

on:
  push:
    paths:
      - 'services/data-ingestion/src/data_ingestion/road/**'
      - 'services/data-ingestion/Dockerfile'
      - 'infrastructure/cdk/**'
      - 'infrastructure/compose/**'
      - '.github/workflows/road-ci.yml'
  pull_request:
    paths:
      - 'services/data-ingestion/src/data_ingestion/road/**'
      - 'services/data-ingestion/Dockerfile'
      - 'infrastructure/cdk/**'
      - 'infrastructure/compose/**'
      - '.github/workflows/road-ci.yml'

permissions:
  contents: read

jobs:
  road-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install -r services/data-ingestion/src/data_ingestion/road/requirements.txt
      - run: python -m pytest -q services/data-ingestion/src/data_ingestion/road/tests

  infrastructure-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: infrastructure/cdk/package-lock.json
      - run: npm ci
        working-directory: infrastructure/cdk
      - run: npm run build
        working-directory: infrastructure/cdk
      - run: npm run test:infra
        working-directory: infrastructure/cdk
